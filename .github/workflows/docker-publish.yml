name: Docker Publish

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/billionsheep/agent-imageflow-api
  WEB_IMAGE: ghcr.io/billionsheep/agent-imageflow-web
  BUILD_TIME: ${{ github.event.head_commit.timestamp }}

jobs:
  test:
    name: Test and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install Web dependencies
        run: npm --prefix web ci

      - name: Test Web
        run: npm --prefix web test -- --run

      - name: Build Web
        run: npm --prefix web run build

      - name: Test Go in pinned container
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/src" \
            -w /src \
            golang:1.25.3-alpine \
            sh -lc '/usr/local/go/bin/go mod download && /usr/local/go/bin/go test ./...'

      - name: Check deployment release files
        run: python3 scripts/check_deployment_release.py

  docker:
    name: Build and publish images
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: API image metadata
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.API_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-,format=short

      - name: Web image metadata
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.WEB_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-,format=short

      - name: Build and publish API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          build-args: |
            AGENT_IMAGEFLOW_VERSION=${{ github.ref_type == 'tag' && github.ref_name || '0.2.0' }}
            AGENT_IMAGEFLOW_COMMIT=${{ github.sha }}
            AGENT_IMAGEFLOW_BUILD_TIME=${{ env.BUILD_TIME }}
            AGENT_IMAGEFLOW_IMAGE_TAG=${{ github.ref_type == 'tag' && github.ref_name || format('sha-{0}', github.sha) }}

      - name: Build and publish Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.web
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          build-args: |
            AGENT_IMAGEFLOW_VERSION=${{ github.ref_type == 'tag' && github.ref_name || '0.2.0' }}
            AGENT_IMAGEFLOW_COMMIT=${{ github.sha }}
            AGENT_IMAGEFLOW_BUILD_TIME=${{ env.BUILD_TIME }}
            AGENT_IMAGEFLOW_IMAGE_TAG=${{ github.ref_type == 'tag' && github.ref_name || format('sha-{0}', github.sha) }}
