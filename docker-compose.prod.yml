services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agent_imageflow
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - ${AGENT_IMAGEFLOW_POSTGRES_DATA:-postgres-data}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d agent_imageflow"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ${AGENT_IMAGEFLOW_REDIS_DATA:-redis-data}:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  api:
    image: ghcr.io/billionsheep/agent-imageflow-api:${IMAGE_TAG:-main}
    command: ["/app/api"]
    environment:
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL}
      REDIS_URL: redis://redis:6379/0
      STORAGE_ROOT: /data/agent-imageflow
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:?set PUBLIC_BASE_URL}
      DEFAULT_WORKSPACE_ID: ${DEFAULT_WORKSPACE_ID:-ws_default}
      DEFAULT_PROJECT_ID: ${DEFAULT_PROJECT_ID:-prj_xhs_anime}
      DEFAULT_CAMPAIGN_ID: ${DEFAULT_CAMPAIGN_ID:-cmp_7day_cover}
      DEFAULT_PROVIDER: ${DEFAULT_PROVIDER:-mock}
      RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS:-60}
      RATE_LIMIT_INSTANCE_MAX_REQUESTS: ${RATE_LIMIT_INSTANCE_MAX_REQUESTS:-120}
      RATE_LIMIT_PROJECT_MAX_REQUESTS: ${RATE_LIMIT_PROJECT_MAX_REQUESTS:-60}
      BASIC_AUTH_USERNAME: ${BASIC_AUTH_USERNAME:-}
      BASIC_AUTH_PASSWORD: ${BASIC_AUTH_PASSWORD:-}
      ADMIN_USERNAME: ${ADMIN_USERNAME:?set ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?set ADMIN_PASSWORD}
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET:?set ADMIN_SESSION_SECRET}
      ADMIN_SESSION_TTL_SECONDS: ${ADMIN_SESSION_TTL_SECONDS:-43200}
      FAL_BASE_URL: ${FAL_BASE_URL:-https://queue.fal.run}
      FAL_REST_BASE_URL: ${FAL_REST_BASE_URL:-https://rest.fal.ai}
      FAL_API_KEY: ${FAL_API_KEY:-}
      FAL_MODEL: ${FAL_MODEL:-openai/gpt-image-2}
      FAL_MAX_CONCURRENCY: ${FAL_MAX_CONCURRENCY:-3}
      FAL_POLL_INTERVAL_MS: ${FAL_POLL_INTERVAL_MS:-1000}
      OPENAI_COMPATIBLE_BASE_URL: ${OPENAI_COMPATIBLE_BASE_URL:-}
      OPENAI_COMPATIBLE_API_KEY: ${OPENAI_COMPATIBLE_API_KEY:-}
      OPENAI_COMPATIBLE_MODEL: ${OPENAI_COMPATIBLE_MODEL:-}
      OPENAI_COMPATIBLE_MAX_CONCURRENCY: ${OPENAI_COMPATIBLE_MAX_CONCURRENCY:-3}
      OPENAI_COMPATIBLE_CONNECT_TIMEOUT_SECONDS: ${OPENAI_COMPATIBLE_CONNECT_TIMEOUT_SECONDS:-30}
      OPENAI_COMPATIBLE_RESPONSE_HEADER_TIMEOUT_SECONDS: ${OPENAI_COMPATIBLE_RESPONSE_HEADER_TIMEOUT_SECONDS:-300}
      OPENAI_COMPATIBLE_TOTAL_TIMEOUT_SECONDS: ${OPENAI_COMPATIBLE_TOTAL_TIMEOUT_SECONDS:-300}
      BEST_OF_HTTP_SCORER_URL: ${BEST_OF_HTTP_SCORER_URL:-}
      BEST_OF_HTTP_SCORER_API_KEY: ${BEST_OF_HTTP_SCORER_API_KEY:-}
      BEST_OF_HTTP_SCORER_TIMEOUT_SECONDS: ${BEST_OF_HTTP_SCORER_TIMEOUT_SECONDS:-30}
      PROVIDER_TIMEOUT_SECONDS: ${PROVIDER_TIMEOUT_SECONDS:-300}
      HTTP_ADDR: :8081
      THUMBNAIL_MAX_WIDTH: ${THUMBNAIL_MAX_WIDTH:-720}
      THUMBNAIL_MAX_HEIGHT: ${THUMBNAIL_MAX_HEIGHT:-720}
    ports:
      - "127.0.0.1:${API_BIND_PORT:-8081}:8081"
    volumes:
      - ${AGENT_IMAGEFLOW_STORAGE_ROOT:-asset-storage}:/data/agent-imageflow
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8081/healthz >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  worker:
    image: ghcr.io/billionsheep/agent-imageflow-api:${IMAGE_TAG:-main}
    command: ["/app/worker"]
    environment:
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL}
      REDIS_URL: redis://redis:6379/0
      STORAGE_ROOT: /data/agent-imageflow
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:?set PUBLIC_BASE_URL}
      DEFAULT_WORKSPACE_ID: ${DEFAULT_WORKSPACE_ID:-ws_default}
      DEFAULT_PROJECT_ID: ${DEFAULT_PROJECT_ID:-prj_xhs_anime}
      DEFAULT_CAMPAIGN_ID: ${DEFAULT_CAMPAIGN_ID:-cmp_7day_cover}
      DEFAULT_PROVIDER: ${DEFAULT_PROVIDER:-mock}
      FAL_BASE_URL: ${FAL_BASE_URL:-https://queue.fal.run}
      FAL_REST_BASE_URL: ${FAL_REST_BASE_URL:-https://rest.fal.ai}
      FAL_API_KEY: ${FAL_API_KEY:-}
      FAL_MODEL: ${FAL_MODEL:-openai/gpt-image-2}
      FAL_MAX_CONCURRENCY: ${FAL_MAX_CONCURRENCY:-3}
      FAL_POLL_INTERVAL_MS: ${FAL_POLL_INTERVAL_MS:-1000}
      OPENAI_COMPATIBLE_BASE_URL: ${OPENAI_COMPATIBLE_BASE_URL:-}
      OPENAI_COMPATIBLE_API_KEY: ${OPENAI_COMPATIBLE_API_KEY:-}
      OPENAI_COMPATIBLE_MODEL: ${OPENAI_COMPATIBLE_MODEL:-}
      OPENAI_COMPATIBLE_MAX_CONCURRENCY: ${OPENAI_COMPATIBLE_MAX_CONCURRENCY:-3}
      OPENAI_COMPATIBLE_CONNECT_TIMEOUT_SECONDS: ${OPENAI_COMPATIBLE_CONNECT_TIMEOUT_SECONDS:-30}
      OPENAI_COMPATIBLE_RESPONSE_HEADER_TIMEOUT_SECONDS: ${OPENAI_COMPATIBLE_RESPONSE_HEADER_TIMEOUT_SECONDS:-300}
      OPENAI_COMPATIBLE_TOTAL_TIMEOUT_SECONDS: ${OPENAI_COMPATIBLE_TOTAL_TIMEOUT_SECONDS:-300}
      BEST_OF_HTTP_SCORER_URL: ${BEST_OF_HTTP_SCORER_URL:-}
      BEST_OF_HTTP_SCORER_API_KEY: ${BEST_OF_HTTP_SCORER_API_KEY:-}
      BEST_OF_HTTP_SCORER_TIMEOUT_SECONDS: ${BEST_OF_HTTP_SCORER_TIMEOUT_SECONDS:-30}
      PROVIDER_TIMEOUT_SECONDS: ${PROVIDER_TIMEOUT_SECONDS:-300}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-6}
      WORKER_MAX_RETRIES: ${WORKER_MAX_RETRIES:-3}
      WORKER_RETRY_BASE_DELAY_SECONDS: ${WORKER_RETRY_BASE_DELAY_SECONDS:-15}
      THUMBNAIL_MAX_WIDTH: ${THUMBNAIL_MAX_WIDTH:-720}
      THUMBNAIL_MAX_HEIGHT: ${THUMBNAIL_MAX_HEIGHT:-720}
    volumes:
      - ${AGENT_IMAGEFLOW_STORAGE_ROOT:-asset-storage}:/data/agent-imageflow
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  web:
    image: ghcr.io/billionsheep/agent-imageflow-web:${IMAGE_TAG:-main}
    ports:
      - "127.0.0.1:${WEB_BIND_PORT:-8080}:8080"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  asset-storage:
