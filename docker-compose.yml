services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agent_imageflow
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d agent_imageflow"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build: .
    command: ["/app/api"]
    environment:
      DATABASE_URL: postgres://agent:agent@postgres:5432/agent_imageflow?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      STORAGE_ROOT: /data/agent-imageflow
      PUBLIC_BASE_URL: http://localhost:8081
      DEFAULT_WORKSPACE_ID: ws_default
      DEFAULT_PROJECT_ID: prj_xhs_anime
      DEFAULT_CAMPAIGN_ID: cmp_7day_cover
      DEFAULT_PROVIDER: ${DEFAULT_PROVIDER:-mock}
      RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS:-60}
      RATE_LIMIT_INSTANCE_MAX_REQUESTS: ${RATE_LIMIT_INSTANCE_MAX_REQUESTS:-0}
      RATE_LIMIT_PROJECT_MAX_REQUESTS: ${RATE_LIMIT_PROJECT_MAX_REQUESTS:-0}
      BASIC_AUTH_USERNAME: ${BASIC_AUTH_USERNAME:-}
      BASIC_AUTH_PASSWORD: ${BASIC_AUTH_PASSWORD:-}
      FAL_BASE_URL: ${FAL_BASE_URL:-https://queue.fal.run}
      FAL_REST_BASE_URL: ${FAL_REST_BASE_URL:-https://rest.fal.ai}
      FAL_API_KEY: ${FAL_API_KEY:-}
      FAL_MODEL: ${FAL_MODEL:-openai/gpt-image-2}
      FAL_MAX_CONCURRENCY: ${FAL_MAX_CONCURRENCY:-3}
      FAL_POLL_INTERVAL_MS: ${FAL_POLL_INTERVAL_MS:-1000}
      OPENAI_COMPATIBLE_BASE_URL: ${OPENAI_COMPATIBLE_BASE_URL:-}
      OPENAI_COMPATIBLE_API_KEY: ${OPENAI_COMPATIBLE_API_KEY:-}
      OPENAI_COMPATIBLE_MODEL: ${OPENAI_COMPATIBLE_MODEL:-gpt-image-2}
      OPENAI_COMPATIBLE_MAX_CONCURRENCY: ${OPENAI_COMPATIBLE_MAX_CONCURRENCY:-3}
      OPENAI_COMPATIBLE_CONNECT_TIMEOUT_SECONDS: ${OPENAI_COMPATIBLE_CONNECT_TIMEOUT_SECONDS:-30}
      OPENAI_COMPATIBLE_RESPONSE_HEADER_TIMEOUT_SECONDS: ${OPENAI_COMPATIBLE_RESPONSE_HEADER_TIMEOUT_SECONDS:-300}
      OPENAI_COMPATIBLE_TOTAL_TIMEOUT_SECONDS: ${OPENAI_COMPATIBLE_TOTAL_TIMEOUT_SECONDS:-300}
      BEST_OF_HTTP_SCORER_URL: ${BEST_OF_HTTP_SCORER_URL:-}
      BEST_OF_HTTP_SCORER_API_KEY: ${BEST_OF_HTTP_SCORER_API_KEY:-}
      BEST_OF_HTTP_SCORER_TIMEOUT_SECONDS: ${BEST_OF_HTTP_SCORER_TIMEOUT_SECONDS:-30}
      PROVIDER_TIMEOUT_SECONDS: ${PROVIDER_TIMEOUT_SECONDS:-300}
      HTTP_ADDR: :8081
      THUMBNAIL_MAX_WIDTH: ${THUMBNAIL_MAX_WIDTH:-720}
      THUMBNAIL_MAX_HEIGHT: ${THUMBNAIL_MAX_HEIGHT:-720}
    ports:
      - "8081:8081"
    volumes:
      - asset-storage:/data/agent-imageflow
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    command: ["/app/worker"]
    environment:
      DATABASE_URL: postgres://agent:agent@postgres:5432/agent_imageflow?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      STORAGE_ROOT: /data/agent-imageflow
      PUBLIC_BASE_URL: http://localhost:8081
      DEFAULT_WORKSPACE_ID: ws_default
      DEFAULT_PROJECT_ID: prj_xhs_anime
      DEFAULT_CAMPAIGN_ID: cmp_7day_cover
      DEFAULT_PROVIDER: ${DEFAULT_PROVIDER:-mock}
      FAL_BASE_URL: ${FAL_BASE_URL:-https://queue.fal.run}
      FAL_REST_BASE_URL: ${FAL_REST_BASE_URL:-https://rest.fal.ai}
      FAL_API_KEY: ${FAL_API_KEY:-}
      FAL_MODEL: ${FAL_MODEL:-openai/gpt-image-2}
      FAL_MAX_CONCURRENCY: ${FAL_MAX_CONCURRENCY:-3}
      FAL_POLL_INTERVAL_MS: ${FAL_POLL_INTERVAL_MS:-1000}
      OPENAI_COMPATIBLE_BASE_URL: ${OPENAI_COMPATIBLE_BASE_URL:-}
      OPENAI_COMPATIBLE_API_KEY: ${OPENAI_COMPATIBLE_API_KEY:-}
      OPENAI_COMPATIBLE_MODEL: ${OPENAI_COMPATIBLE_MODEL:-gpt-image-2}
      OPENAI_COMPATIBLE_MAX_CONCURRENCY: ${OPENAI_COMPATIBLE_MAX_CONCURRENCY:-3}
      OPENAI_COMPATIBLE_CONNECT_TIMEOUT_SECONDS: ${OPENAI_COMPATIBLE_CONNECT_TIMEOUT_SECONDS:-30}
      OPENAI_COMPATIBLE_RESPONSE_HEADER_TIMEOUT_SECONDS: ${OPENAI_COMPATIBLE_RESPONSE_HEADER_TIMEOUT_SECONDS:-300}
      OPENAI_COMPATIBLE_TOTAL_TIMEOUT_SECONDS: ${OPENAI_COMPATIBLE_TOTAL_TIMEOUT_SECONDS:-300}
      BEST_OF_HTTP_SCORER_URL: ${BEST_OF_HTTP_SCORER_URL:-}
      BEST_OF_HTTP_SCORER_API_KEY: ${BEST_OF_HTTP_SCORER_API_KEY:-}
      BEST_OF_HTTP_SCORER_TIMEOUT_SECONDS: ${BEST_OF_HTTP_SCORER_TIMEOUT_SECONDS:-30}
      PROVIDER_TIMEOUT_SECONDS: ${PROVIDER_TIMEOUT_SECONDS:-300}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-6}
      WORKER_MAX_RETRIES: ${WORKER_MAX_RETRIES:-3}
      WORKER_RETRY_BASE_DELAY_SECONDS: ${WORKER_RETRY_BASE_DELAY_SECONDS:-15}
      THUMBNAIL_MAX_WIDTH: ${THUMBNAIL_MAX_WIDTH:-720}
      THUMBNAIL_MAX_HEIGHT: ${THUMBNAIL_MAX_HEIGHT:-720}
    volumes:
      - asset-storage:/data/agent-imageflow
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres-data:
  asset-storage:
