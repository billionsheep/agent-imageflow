services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agent_imageflow
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d agent_imageflow"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build: .
    command: ["/app/api"]
    environment:
      DATABASE_URL: postgres://agent:agent@postgres:5432/agent_imageflow?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      STORAGE_ROOT: /data/agent-imageflow
      PUBLIC_BASE_URL: http://localhost:8081
      DEFAULT_WORKSPACE_ID: ws_default
      DEFAULT_PROJECT_ID: prj_xhs_anime
      DEFAULT_CAMPAIGN_ID: cmp_7day_cover
      DEFAULT_PROVIDER: mock
      HTTP_ADDR: :8081
    ports:
      - "8081:8081"
    volumes:
      - asset-storage:/data/agent-imageflow
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    command: ["/app/worker"]
    environment:
      DATABASE_URL: postgres://agent:agent@postgres:5432/agent_imageflow?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      STORAGE_ROOT: /data/agent-imageflow
      PUBLIC_BASE_URL: http://localhost:8081
      DEFAULT_WORKSPACE_ID: ws_default
      DEFAULT_PROJECT_ID: prj_xhs_anime
      DEFAULT_CAMPAIGN_ID: cmp_7day_cover
      DEFAULT_PROVIDER: mock
      WORKER_CONCURRENCY: 1
    volumes:
      - asset-storage:/data/agent-imageflow
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres-data:
  asset-storage:

